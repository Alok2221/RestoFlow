spring.application.name=restaurant_api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:restoflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.check-template-location=false

# Disable logging of resolved exceptions for favicon
spring.mvc.log-resolved-exception=false
logging.level.org.springframework.web.servlet.resource.NoResourceFoundException=OFF

spring.web.resources.add-mappings=true
