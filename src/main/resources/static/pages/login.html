<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - RestoFlow</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">
                <i class="bi bi-cup-hot-fill me-2"></i>RestoFlow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Strona główna</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="reservation.html">Rezerwacja</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="event.html">Wydarzenia</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <button class="btn btn-link nav-link text-white" id="themeToggle" title="Zmień motyw">
                            <i class="bi bi-moon-fill" id="themeIcon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <ul class="nav nav-tabs mb-4" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                                    Logowanie
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">
                                    Rejestracja
                                </button>
                            </li>
                        </ul>
                        
                        <div class="tab-content">
                            <!-- Login Tab -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <h3 class="mb-4">Zaloguj się</h3>
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="loginEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Hasło</label>
                                        <input type="password" class="form-control" id="loginPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>Zaloguj
                                    </button>
                                </form>
                            </div>
                            
                            <!-- Register Tab -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <h3 class="mb-4">Zarejestruj się</h3>
                                <form id="registerForm">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Imię *</label>
                                            <input type="text" class="form-control" id="registerFirstName" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Nazwisko *</label>
                                            <input type="text" class="form-control" id="registerLastName" required>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Email *</label>
                                            <input type="email" class="form-control" id="registerEmail" required>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Hasło *</label>
                                            <input type="password" class="form-control" id="registerPassword" minlength="6" required>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Telefon</label>
                                            <input type="tel" class="form-control" id="registerPhone">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Adres</label>
                                            <input type="text" class="form-control" id="registerAddress">
                                        </div>
                                        <div class="col-12">
                                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                                <i class="bi bi-person-plus me-2"></i>Zarejestruj
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>2026 Projekt RestoFlow - system restauracji online</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
